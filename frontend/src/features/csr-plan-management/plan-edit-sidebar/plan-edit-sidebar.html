<div class="flex flex-col flex-1 min-h-0 h-full overflow-hidden">
  <!-- Header -->
  <div class="flex items-center justify-between gap-3 px-6 py-4 border-b border-gray-200 flex-shrink-0">
    <h2 class="text-lg font-bold text-gray-800">{{ 'PLAN_EDIT.TITLE' | translate }}</h2>
    <button type="button" (click)="close()"
      class="p-2 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
      [attr.aria-label]="'COMMON.CLOSE' | translate">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col flex-1 min-h-0 overflow-hidden">
    <div class="flex-1 min-h-0 overflow-y-auto px-6 py-6 space-y-5">
      <div class="text-sm text-gray-500">
        {{ 'PLAN_EDIT.SITE_READONLY' | translate }}:
        <span class="font-semibold text-gray-800">{{ siteLabel() }}</span>
        <span class="text-gray-400">— {{ plan.year }}</span>
      </div>

      <div class="grid grid-cols-1 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">{{ 'PLAN_EDIT.YEAR_LABEL' | translate }} <span class="text-red-500">*</span></label>
          <input type="number" formControlName="year" min="2000" max="2100"
            class="w-full pl-4 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            [class.border-red-400]="form.get('year')?.touched && form.get('year')?.invalid"/>
          <p class="text-xs text-red-500 mt-1" *ngIf="form.get('year')?.touched && form.get('year')?.invalid">
            {{ 'PLAN_EDIT.YEAR_INVALID' | translate }}
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">{{ 'PLAN_EDIT.VALIDATION_MODE' | translate }}</label>
          <select formControlName="validation_mode"
            class="w-full pl-4 pr-10 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none appearance-none cursor-pointer">
            <option value="101">{{ 'PLAN_EDIT.MODE_CORPORATE_ONLY' | translate }}</option>
            <option value="111">{{ 'PLAN_EDIT.MODE_ALL' | translate }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">{{ 'PLAN_CREATE.TOTAL_BUDGET' | translate }}</label>
          <input type="number" formControlName="total_budget" min="0" step="0.01" [attr.placeholder]="'COMMON.OPTIONAL' | translate"
            class="w-full pl-4 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
        </div>
      </div>

      <div *ngIf="errorMsg()"
        class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
        {{ errorMsg() }}
      </div>
    </div>

    <div class="flex-shrink-0 px-6 py-4 border-t border-gray-200 flex gap-3">
      <button type="button" (click)="close()" [disabled]="saving()"
        class="flex-1 px-4 py-2.5 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-50 transition text-sm font-medium disabled:opacity-60">
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button type="submit" [disabled]="saving() || form.invalid"
        class="flex-1 px-4 py-2.5 rounded-xl bg-brand-900 hover:bg-brand-800 disabled:opacity-60 disabled:cursor-not-allowed text-white transition text-sm font-semibold">
        {{ saving() ? ('COMMON.SAVING' | translate) : ('COMMON.CONFIRM' | translate) }}
      </button>
    </div>
  </form>
</div>
