<div class="sidebar relative flex flex-col h-full bg-[rgb(30,41,59)] text-white transition-all duration-300"
  [ngClass]="isCollapsed() ? 'w-16 collapsed' : 'w-64'">
  <div class="relative flex items-center p-4">
    <div class="flex min-w-0 items-center">
      <img
        src="/logo/csr-insight-high-resolution-logo-only-transparent-inverse.png"
        alt="CSR Insight"
        class="h-8 w-8 flex-shrink-0 object-contain"
      />
      <div
        class="brand-name ml-3 min-w-0 transition-opacity duration-300"
        [ngClass]="isCollapsed() ? 'opacity-0 w-0 h-0 overflow-hidden m-0' : 'opacity-100'"
      >
        <div class="truncate text-lg font-extrabold uppercase tracking-[0.05em] text-white [font-family:'Lora',serif]">
          CSR Insight.
        </div>
      </div>
    </div>
  </div>
  <nav class="flex-1 overflow-y-auto px-2">
    <div *ngFor="let section of filteredNavItems(); trackBy: trackBySection" class="mb-4">
      <div *ngIf="!section.hideSectionLabel" class="section uppercase text-gray-400 text-xs font-semibold mb-2 transition-opacity duration-300"
        [ngClass]="isCollapsed() ? 'opacity-0 h-0 overflow-hidden' : 'opacity-100'">
        {{ section.sectionKey | translate }}
      </div>
      <ul>
        <li *ngFor="let item of section.items; trackBy: trackByItem">
          <a [routerLink]="item.path" routerLinkActive="bg-white/10"
            class="flex items-center transition-all duration-300 py-2 px-2 rounded hover:bg-white/10"
            [ngClass]="isCollapsed() ? 'justify-center' : 'justify-start'">
            <span class="flex-shrink-0 w-6 h-6 flex justify-center text-gray-200">
              <fa-icon [icon]="item.icon" class="w-5 h-5"></fa-icon>
            </span>
            <span class="transition-all duration-300 whitespace-nowrap overflow-hidden"
              [ngClass]="isCollapsed() ? 'w-0 opacity-0 m-0 p-0' : 'ml-3 w-auto opacity-100'">
              {{ item.labelKey | translate }}
            </span>
          </a>
        </li>
      </ul>
    </div>
  </nav>
  <div class="mt-auto p-4 border-t border-white/10 flex flex-col space-y-3">
    <div *ngIf="user()" class="flex items-center gap-3 transition-opacity duration-300"
      [ngClass]="isCollapsed() ? 'opacity-0 h-0 overflow-hidden' : 'opacity-100'">
      <div class="flex-shrink-0 w-9 h-9 rounded-full overflow-hidden bg-white/15 flex items-center justify-center text-sm font-semibold text-white">
        @if (avatarDisplayUrl()) {
          <img [src]="avatarDisplayUrl()!" alt="" class="w-full h-full object-cover" />
        } @else {
          {{ userInitials() }}
        }
      </div>
      <div class="min-w-0 flex-1">
        <div class="text-white text-sm font-medium truncate">{{ user()?.email }}</div>
        <div class="text-gray-400 text-xs truncate">{{ userDisplayName() }}</div>
      </div>
    </div>
    <div class="flex gap-2" [ngClass]="isCollapsed() ? 'flex-col' : 'flex-row'">
      <a *ngIf="!isCollapsed()" routerLink="/account/profile" routerLinkActive="bg-white/10"
        class="flex-1 flex items-center justify-center gap-1.5 py-1.5 px-2 rounded text-xs font-medium text-white/90 hover:bg-white/10 transition-colors border border-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        {{ 'NAV.ITEMS.MY_PROFILE' | translate }}
      </a>
      <button class="flex-1 flex items-center justify-center gap-1.5 py-1.5 px-2 rounded text-xs font-semibold bg-white text-slate-800 hover:bg-gray-100 transition-colors"
        (click)="logout()">
        <span *ngIf="!isCollapsed()">{{ 'COMMON.LOGOUT' | translate }}</span>
        <span *ngIf="isCollapsed()" class="text-sm">⇥</span>
      </button>
    </div>
  </div>
</div>
