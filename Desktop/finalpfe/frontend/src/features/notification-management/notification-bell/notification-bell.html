<div class="relative">

 <button (click)="toggleDropdown($event)"
  class="relative p-2.5 rounded-xl hover:bg-gray-100 transition-colors">
  <i class="fas fa-bell text-xl text-gray-500 hover:text-gray-700"></i>
  <span *ngIf="unreadCount() > 0"
    class="absolute -top-0.5 -right-0.5 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center leading-none">
    {{ unreadCount() > 9 ? '9+' : unreadCount() }}
  </span>
</button>

  <!-- Dropdown -->
  <div *ngIf="isOpen"
    class="absolute right-0 top-12 w-80 bg-white border border-gray-200 rounded-2xl shadow-xl z-[9999] overflow-hidden"
    (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <h3 class="font-semibold text-sm" style="color: rgb(30,41,59)">
        Notifications
        <span *ngIf="unreadCount() > 0"
          class="ml-1.5 px-1.5 py-0.5 text-xs font-bold rounded-full text-white"
          style="background-color: rgb(30,41,59)">
          {{ unreadCount() }}
        </span>
      </h3>
      <button *ngIf="unreadCount() > 0"
        (click)="markAllRead($event)"
        class="text-xs text-gray-400 hover:text-gray-600 transition">
        Tout marquer comme lu
      </button>
    </div>

    <!-- Liste -->
    <div class="max-h-96 overflow-y-auto divide-y divide-gray-50">

      <div *ngFor="let notif of notifications()"
        (click)="markRead(notif, $event)"
        class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer"
        [ngClass]="!notif.is_read ? getTypeBg(notif.type) : ''">

        <!-- Icône type -->
        <div class="flex-shrink-0 mt-0.5">
          <i [class]="getTypeIcon(notif.type) + ' ' + getTypeColor(notif.type)"></i>
        </div>

        <!-- Contenu -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 truncate">{{ notif.title }}</p>
          <p class="text-xs text-gray-500 mt-0.5 line-clamp-2">{{ notif.message }}</p>
          <p class="text-xs text-gray-400 mt-1">{{ formatDate(notif.created_at) }}</p>
        </div>

        <!-- Dot non lue + supprimer -->
        <div class="flex flex-col items-end gap-1 flex-shrink-0">
          <div *ngIf="!notif.is_read"
            class="w-2 h-2 rounded-full bg-red-500">
          </div>
          <button (click)="deleteNotif(notif, $event)"
            class="text-gray-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
            <i class="fas fa-times text-xs"></i>
          </button>
        </div>

      </div>

      <!-- Vide -->
      <div *ngIf="notifications().length === 0"
        class="px-4 py-12 text-center text-gray-400">
        <i class="fas fa-bell-slash text-3xl mb-2 block text-gray-300"></i>
        <p class="text-sm">Aucune notification</p>
      </div>

    </div>

  </div>
</div>
