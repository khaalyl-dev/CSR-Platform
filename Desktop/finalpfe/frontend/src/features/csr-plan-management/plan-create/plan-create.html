<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-2xl">

    <div class="flex items-center gap-4 mb-6">
      <button type="button" title="Retour" (click)="cancel()"
        class="flex items-center justify-center w-10 h-10 rounded-xl bg-white border border-gray-200 text-gray-500 hover:text-gray-700 hover:border-gray-300 hover:bg-gray-50 shadow-sm transition-all duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
        </svg>
      </button>
      <div>
        <h1 class="text-xl font-bold text-gray-800">Nouveau plan CSR</h1>
        <p class="text-gray-400 text-sm">Créer un plan annuel pour un site</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="h-1.5 bg-gradient-to-r from-gray-800 via-gray-500 to-gray-400"></div>
      <div class="flex items-center gap-4 px-8 py-6 border-b border-gray-100">
        <div class="w-12 h-12 rounded-2xl bg-gray-600 flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-white">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
          </svg>
        </div>
        <div>
          <h2 class="text-lg font-bold text-gray-800">Informations du plan</h2>
          <p class="text-gray-400 text-sm">Les champs marqués <span class="text-red-500">*</span> sont obligatoires</p>
        </div>
      </div>

      <form [formGroup]="planForm" (ngSubmit)="submit()" class="px-8 py-6 space-y-5">

        <div *ngIf="loadingSites" class="py-8 text-center text-gray-500 text-sm">Chargement des sites...</div>

        <ng-container *ngIf="!loadingSites">
          <!-- Site -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Site <span class="text-red-500">*</span></label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none z-10">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-gray-400">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
                </svg>
              </div>
              <select formControlName="site_id"
                class="w-full pl-9 pr-10 py-2.5 bg-gray-100 border-0 rounded-xl text-sm text-gray-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all appearance-none cursor-pointer hover:bg-gray-200"
                [class.border]="planForm.get('site_id')?.touched && planForm.get('site_id')?.invalid"
                [class.border-red-400]="planForm.get('site_id')?.touched && planForm.get('site_id')?.invalid">
                <option value="">Choisir un site</option>
                <option *ngFor="let site of sites" [value]="site.id">{{ site.name }} ({{ site.code }})</option>
              </select>
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 text-gray-500">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
                </svg>
              </div>
            </div>
            <p class="text-xs text-red-500 mt-1" *ngIf="planForm.get('site_id')?.touched && planForm.get('site_id')?.invalid">
              Le site est obligatoire
            </p>
          </div>

          <!-- Année + Mode de validation -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Année <span class="text-red-500">*</span></label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-gray-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
                  </svg>
                </div>
                <input type="number" formControlName="year" min="2000" max="2100"
                  class="w-full pl-9 pr-4 py-2.5 bg-gray-100 border-0 rounded-xl text-sm text-gray-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition hover:bg-gray-200"
                  [class.border]="planForm.get('year')?.touched && planForm.get('year')?.invalid"
                  [class.border-red-400]="planForm.get('year')?.touched && planForm.get('year')?.invalid"/>
              </div>
              <p class="text-xs text-red-500 mt-1" *ngIf="planForm.get('year')?.touched && planForm.get('year')?.invalid">
                Année invalide (2000–2100)
              </p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Mode de validation</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-gray-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 6.75 12.75 6.75 15.75 9 15.75m0 0 6-6m-6 6L9 9m-6 0 0 0 4.5 2.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                  </svg>
                </div>
                <select formControlName="validation_mode"
                  class="w-full pl-9 pr-10 py-2.5 bg-gray-100 border-0 rounded-xl text-sm text-gray-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all appearance-none cursor-pointer hover:bg-gray-200">
                  <option value="101">Corporate only</option>
                  <option value="111">ALL</option>
                </select>
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 text-gray-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- Budget total -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Budget total (€)</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-gray-400">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659 1.409 1.409 2.818 2.818 1.409-1.409 2.818-2.818-1.409-1.409L12 15.341M12 6v12m-3-2.818-2.818 2.818 1.409 1.409L12 15.341m0 0 2.818 2.818 1.409-1.409L12 15.341m-2.818-2.818 1.409-1.409L12 8.659" />
                </svg>
              </div>
              <input type="number" formControlName="total_budget" min="0" step="0.01" placeholder="Optionnel"
                class="w-full pl-9 pr-4 py-2.5 bg-gray-100 border-0 rounded-xl text-sm text-gray-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition hover:bg-gray-200"/>
            </div>
          </div>
        </ng-container>

        <div *ngIf="errorMsg"
          class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
          {{ errorMsg }}
        </div>
        <div *ngIf="errorMsg && sites.length === 0" class="flex justify-end">
          <button type="button" (click)="retryLoadSites()"
            class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm">
            Recharger les sites
          </button>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
          <button type="button" (click)="cancel()"
            class="px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-50 transition text-sm font-medium">
            Annuler
          </button>
          <button type="submit" [disabled]="loading || loadingSites || planForm.invalid"
            class="px-6 py-2.5 rounded-xl bg-gray-800 hover:bg-gray-700 disabled:opacity-60 disabled:cursor-not-allowed text-white transition text-sm font-semibold">
            {{ loading ? 'Création...' : 'Créer le plan' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
